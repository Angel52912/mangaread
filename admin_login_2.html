<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaReadV1 - Admin Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;700&family=Space+Grotesk:wght@700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-gutter">
        <div class="w-full glass-panel asymmetric-border p-12 shadow-2xl flex flex-col gap-8 max-w-[900px]">
            <h1 class="font-headline-md text-[48px] text-primary uppercase text-center">Registro de Admin</h1>
            
            <!-- Registration Form -->
            <form id="registerForm" class="space-y-8">
                <div class="space-y-6">
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">mail</span>
                        <input id="reg-email" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Nuevo Email Admin" type="email" required>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">lock</span>
                        <input id="reg-pass" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Contraseña Segura" type="password" required>
                        <button type="button" class="absolute right-0 bottom-4 text-on-surface-variant hover:text-primary" onclick="togglePass('reg-pass', this)">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">verified_user</span>
                        <input id="reg-pass-confirm" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Confirmar Contraseña" type="password" required>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">key</span>
                        <input id="reg-invite-code" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Código de Invitación" type="text" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-tertiary text-on-tertiary font-headline-md text-[40px] py-6 hover:brightness-110 active:scale-95 transition-all shadow-[6px_6px_0px_0px_#000000]">
                    CREAR CUENTA ADMIN
                </button>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/manga-service.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

    <script>
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }
    </script>
</body>
</html>
