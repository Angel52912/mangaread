<!DOCTYPE html><html lang="es" class="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Gestión de Géneros</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;700&family=Space+Grotesk:wght@700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
    .surface-glass { background: rgba(32, 31, 31, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .kinetic-border { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
</style>
</head>
<body class="min-h-screen bg-surface text-on-surface p-gutter">

<main class="max-w-[600px] mx-auto mt-12 surface-glass p-8 kinetic-border">
    <a href="admin.html" class="flex items-center gap-2 text-primary hover:text-white mb-6 transition-colors">
        <span class="material-symbols-outlined">arrow_back</span>
        Volver al Panel
    </a>
    <h1 class="font-headline-md text-headline-md text-primary mb-8 uppercase">Gestión de Géneros</h1>

    <!-- Formulario para agregar -->
    <form id="genreForm" class="flex gap-4 mb-8">
        <input type="text" id="genreName" placeholder="Nombre del Género" class="flex-grow bg-white/5 border-b-2 border-primary p-3 outline-none focus:border-tertiary" required>
        <button type="submit" class="bg-primary text-on-primary px-6 py-3 font-label-bold uppercase kinetic-border hover:bg-tertiary transition-all">Agregar</button>
    </form>

    <!-- Lista -->
    <div id="genresList" class="flex flex-wrap gap-3">
        <!-- Generos items here -->
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/manga-service.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
