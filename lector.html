<body class="font-body-md text-body-md h-screen flex flex-col retro-grid bg-surface text-on-surface">
    <!-- Top App Bar -->
    <header class="w-full top-0 sticky bg-surface/80 backdrop-blur-md z-50 border-b border-white/10 flex justify-between items-center px-gutter py-4 bg-surface">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
            <span class="font-headline-md text-headline-md text-primary tracking-tighter uppercase">MangaReadV1</span>
            <div class="h-6 w-px bg-white/10 mx-2"></div>
            <div class="flex flex-col">
                <span id="readerMangaTitle" class="font-label-bold text-label-bold text-primary uppercase tracking-widest">CARGANDO...</span>
                <span id="readerVolumeTitle" class="text-[10px] text-on-surface-variant uppercase">CARGANDO...</span>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors cursor-pointer active:scale-95" onclick="history.back()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex overflow-hidden">
        <!-- LEFT COLUMN: Sidebar (20%) -->
        <aside class="w-1/5 h-full glass-panel border-r border-white/10 flex flex-col p-panel-gap z-40 bg-surface-container-low">
            <button class="mb-8 flex items-center justify-center gap-2 w-full py-3 bg-surface-container hover:bg-primary hover:text-on-primary transition-all duration-300 font-label-bold text-label-bold uppercase border border-primary/20 rounded-lg group bg-surface-container-high" onclick="history.back()">
                <span class="material-symbols-outlined text-sm group-hover:translate-x-[-2px] transition-transform">arrow_back</span>
                Volver
            </button>
            <div class="flex-grow overflow-y-auto custom-scrollbar space-y-8 pr-2">
                <!-- Capítulos Section -->
                <div>
                    <h3 class="font-label-bold text-label-bold text-primary mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">format_list_numbered</span>
                        Capítulos
                    </h3>
                    <ul id="chaptersList" class="space-y-1 text-sm">
                        <!-- Capítulos will be populated here -->
                    </ul>
                </div>
            </div>
        </aside>

        <!-- CENTER COLUMN: Reading Area (65%) -->
        <section class="w-[65%] h-full flex items-center justify-center p-gutter relative bg-surface-dim">
            <div class="flex flex-col items-center gap-6 w-full max-w-5xl">
                <div id="book" class="w-full aspect-[3/2] page-flip-container relative bg-surface-container-highest shadow-2xl rounded-sm overflow-hidden group">
                    <!-- StPageFlip content will be injected here -->
                </div>
                <div class="flex items-center gap-8">
                    <button id="prevBtn" class="p-3 bg-surface-container-high hover:bg-primary hover:text-on-primary rounded-full transition-all active:scale-95 border border-white/5 px-8">
                        <span class="material-symbols-outlined text-3xl">chevron_left</span>
                    </button>
                    <button id="nextBtn" class="p-3 bg-surface-container-high hover:bg-primary hover:text-on-primary rounded-full transition-all active:scale-95 border border-white/5 px-8">
                        <span class="material-symbols-outlined text-3xl">chevron_right</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- RIGHT COLUMN: Decorative (15%) -->
        <aside class="w-[15%] h-full relative flex flex-col justify-end p-margin-safe overflow-hidden bg-surface-dim">
            <div class="absolute inset-0 z-0 opacity-20 grayscale hover:grayscale-0 transition-all duration-500">
                <img alt="Manga Collage Background" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMFOqNUIe_h7ZZCqyDfTvQJjyqp0B5YxOGd6_TTC-I8TFfH5TMLwdE1QTTU-6cwzO1TNiH0O3LBwavJ6hc--w-wLX8ZkNcIbGUwoLJOo2lt6op2cGin_zn_NgsZYfnVfgJLxwo3So7G4dGmeUeCr97uae_5TOUQWlS0iw1Y8qioqZ0QCs359KTJqvsiC-3foojV0VcYL-o39JzxQZy9RNtQ_j0hnWr7XHRW7NqqCwevhmTS72jDjCLAXpg_4OO1wayv99tsZoJvE0">
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60 z-10"></div>
            <div class="relative z-20 flex flex-col h-full justify-end text-right">
                <p class="rotate-90 text-primary opacity-10 font-headline-lg uppercase whitespace-nowrap tracking-widest text-8xl">SHONEN VAULT</p>
            </div>
        </aside>
    </main>

    <!-- Bottom Navigation Bar -->
    <footer class="w-full bottom-0 fixed bg-surface-container-lowest z-40 border-t-2 border-primary shadow-[0_-4px_10px_rgba(0,0,0,0.5)] flex justify-between items-center px-margin-safe py-3">
        <div class="flex items-center gap-3">
            <span class="font-label-bold text-on-surface-variant uppercase text-[10px]">Página</span>
            <div class="relative flex items-center">
                <span id="currentPage" class="text-primary font-label-bold text-lg px-2">0</span>
            </div>
            <span class="font-label-bold text-on-surface-variant uppercase text-[10px]">de <span id="totalPages">0</span></span>
        </div>
    </footer>

    <!-- Dependencias y Módulos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configurar el worker para PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/manga-service.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/reader.js"></script>
    <script src="js/app.js"></script>

    <script>
        const readerContainer = document.querySelector('.page-flip-container');
        if (readerContainer) {
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
                readerContainer.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }
    </script>
</body>
</html>
