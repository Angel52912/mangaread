<script>
    // Micro-interaction for volume cards
    document.querySelectorAll('.surface-container-low').forEach(card => {
        card.addEventListener('mouseenter', () => {
            card.style.transform = 'translateY(-2px)';
            card.style.boxShadow = '0 10px 20px rgba(255, 181, 158, 0.1)';
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'translateY(0)';
            card.style.boxShadow = 'none';
        });
    });

    // Parallax effect for collage background
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        const leftBg = document.querySelector('.manga-grid-bg:first-child');
        const rightBg = document.querySelector('.manga-grid-bg:nth-child(2)');
        if(leftBg && rightBg) {
            leftBg.style.backgroundPositionY = (scrolled * 0.2) + 'px';
            rightBg.style.backgroundPositionY = (scrolled * 0.15) + 'px';
        }
    });
</script>
