<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Anton:wght@100..900&family=Hanken+Grotesk:wght@100..900&family=Space+Grotesk:wght@100..900&display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {

                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#c9d9f0",
                        "surface-container": "#201f1f",
                        "on-secondary-container": "#fff6f5",
                        "background": "#131313",
                        "primary-container": "#2b4570",
                        "on-tertiary-fixed-variant": "#544600",
                        "secondary-fixed": "#ffdad4",
                        "on-secondary": "#690000",
                        "on-background": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-secondary-fixed": "#410000",
                        "on-secondary-fixed-variant": "#930100",
                        "inverse-primary": "#3d5a8a",
                        "surface-variant": "#353534",
                        "on-surface-variant": "#e6beb2",
                        "primary-fixed-dim": "#93b4e3",
                        "outline-variant": "#5c4037",
                        "on-primary-fixed": "#0d1b30",
                        "inverse-on-surface": "#313030",
                        "on-tertiary-fixed": "#221b00",
                        "secondary-fixed-dim": "#ffb4a8",
                        "surface-container-low": "#1c1b1b",
                        "surface-dim": "#131313",
                        "secondary-container": "#e60000",
                        "on-primary-fixed-variant": "#1e3252",
                        "error-container": "#93000a",
                        "surface-tint": "#93b4e3",
                        "inverse-surface": "#e5e2e1",
                        "secondary": "#ffb4a8",
                        "outline": "#ad897e",
                        "surface": "#131313",
                        "on-tertiary-container": "#4c3e00",
                        "on-primary": "#0d1b30",
                        "surface-bright": "#3a3939",
                        "primary": "#93b4e3",
                        "on-surface": "#e5e2e1",
                        "on-primary-container": "#dce6f5",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#2a2a2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-safe": "32px",
                        "unit": "4px",
                        "asymmetric-offset": "48px",
                        "panel-gap": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Anton"],
                        "display-hero": ["Anton"],

                        "display-hero": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],

                        "label-bold": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "700"}]

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .retro-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
        }
        .retro-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #93b4e3;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #93b4e3;
        }
        input:focus {
            outline: none;
            border-color: #93b4e3 !important;
            box-shadow: 0 0 15px rgba(255, 181, 158, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Background Decoration (Manga Style) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none grayscale mix-blend-overlay" data-alt="A cinematic black and white manga collage featuring dynamic action panels, intense speed lines, and dramatic character close-ups from classic shonen manga. The art style is gritty with high contrast, heavy ink work, and screentone textures that give it a raw, paper-like feel. Large diagonal gutters separate the panels, creating an unstable, high-energy composition that covers the entire background." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBQYIJCOFqz6pFBufQ-Dt6TETaFRdLxBGkWdoKJu3jgmbSgGcJ3Gu27x_ldXjrEhEBDXAILCZo_hrRALBRDBSz1KmrY9L_A55w8JP0ACN1GcNg0eCNggFG2PRidQ-7XPJjwmTu6XEkj2G5M8QySX1HDbLvsBhJTMqK9erm5mnqSVDkKFTh50fi8ZXTcn4QN10P1A6uLn1pnHIetVF3zNtmJBRAiUXts2JVdoy65qAtzMwjo5QeOn3AhbRgJAxOh2ihhLuW3y3IH-io')">
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
<!-- Modal Container -->
<div class="glass-panel retro-shadow w-full max-w-2xl relative animate-in fade-in zoom-in duration-300 overflow-hidden flex flex-col max-h-[921px]">
<!-- Modal Header -->
<div class="p-6 border-b-2 border-primary/20 bg-surface-container flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-primary tracking-tight">AGREGAR TOMO</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors" onclick="window.close()">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
</div>
<form id="volumeForm" class="space-y-8">
<input type="hidden" id="mangaId" value=""/>
<!-- Row 1: Title & Chapters -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-panel-gap">
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-primary block uppercase">Título del Tomo</label>
<input id="volumeTitle" class="w-full bg-white/5 border-b-2 border-primary/40 p-3 text-on-surface font-body-md placeholder:text-on-surface-variant/40 transition-all" placeholder="Ej: Tomo 1 - El inicio de la locura" type="text" required/>
</div>
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-primary block uppercase">Capítulos Incluidos (label)</label>
<input id="volumeChaptersLabel" class="w-full bg-white/5 border-b-2 border-primary/40 p-3 text-on-surface font-body-md placeholder:text-on-surface-variant/40 transition-all" placeholder="Ej: Caps. 1 al 12" type="text"/>
</div>
</div>
<!-- Row 2: File Upload Area -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-primary block uppercase">Subir Archivo PDF</label>
<div class="border-2 border-dashed border-primary/30 bg-white/5 p-10 flex flex-col items-center justify-center group hover:border-primary hover:bg-primary/5 transition-all cursor-pointer">
<input id="pdf-upload" type="file" class="hidden" accept="application/pdf" required/>
<label for="pdf-upload" class="cursor-pointer flex flex-col items-center">
<span class="material-symbols-outlined text-5xl text-primary mb-4 group-hover:scale-110 transition-transform" data-weight="fill">picture_as_pdf</span>
<p id="pdfName" class="font-label-bold text-on-surface text-center">ARRASTRA TU ARCHIVO AQUÍ O HAZ CLIC</p>
<p class="text-xs text-on-surface-variant mt-2 uppercase tracking-widest">Solo documentos PDF</p>
</label>
</div>
</div>
<!-- Special Section: Marcas de Capítulos -->
<div class="space-y-4">
<div class="flex justify-between items-end border-b border-white/10 pb-2">
<h3 class="font-label-bold text-label-bold text-primary uppercase">Marcas de Capítulos</h3>
<button type="button" id="addMarkBtn" class="bg-surface-container-highest border border-primary/30 px-4 py-1 font-label-bold text-xs text-on-surface hover:bg-primary hover:text-on-primary transition-all retro-shadow-sm active:translate-y-1 active:shadow-none">
                            + AÑADIR MARCA
                        </button>
</div>
<!-- Dynamic Row Examples -->
<div id="chapterMarksContainer" class="space-y-3">
    <!-- Marks will be populated here -->
</div>
</div>
</form>
...
<!-- Modal Footer / Bottom Buttons -->
<div class="p-6 bg-surface-container flex flex-col sm:flex-row gap-4 border-t-2 border-primary/20">
<button type="button" class="flex-1 py-4 border-2 border-white/10 text-on-surface font-headline-md text-xl hover:bg-white/10 transition-all uppercase tracking-tight active:translate-y-1" onclick="window.close()">
                    Cancelar
                </button>
<button type="button" id="saveVolumeBtn" class="flex-1 py-4 bg-primary text-on-primary font-headline-md text-xl retro-shadow-sm hover:bg-secondary-container hover:text-on-secondary-container transition-all uppercase tracking-tight active:translate-y-1 active:shadow-none">
                    Guardar Tomo
                </button>
</div>
</div>
</div>
<!-- Background Decorative Text (Vertical) -->
<div class="fixed right-8 top-1/2 -translate-y-1/2 hidden lg:block select-none pointer-events-none">
<h1 class="font-display-hero text-surface-container-highest text-8xl opacity-10 leading-none" style="writing-mode: vertical-rl;">
            KINETIC TERMINAL
        </h1>
</div>
<!-- Dependencias y Módulos -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/manga-service.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
        // Micro-interaction for input hover effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('scale-105', 'translate-x-1');
                input.parentElement.querySelector('label')?.classList.replace('text-primary', 'text-tertiary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('scale-105', 'translate-x-1');
                input.parentElement.querySelector('label')?.classList.replace('text-tertiary', 'text-primary');
            });
        });
    </script>
</body></html>
