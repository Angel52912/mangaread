<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaReadV1 - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;700&family=Space+Grotesk:wght@700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .asymmetric-border { clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 0% 100%); }
        .glass-panel { background: rgba(19, 19, 19, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shonen-glow:hover { box-shadow: 0 0 20px rgba(255, 87, 26, 0.3); }
        .collage-bg { background-blend-mode: multiply; background-color: #131313; }
        .tab-active { color: #ffb59e; border-bottom: 3px solid #ffb59e; }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">

    <!-- Background Layers -->
    <div class="fixed inset-0 z-0 flex pointer-events-none">
        <div class="hidden lg:block w-1/3 h-full collage-bg opacity-40 grayscale hover:grayscale-0 transition-all duration-1000" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDkM6qOiAYPKGNP5c_28WjQW22MXgvWNliiiTSEv4qvpgIBX5r9pqRBEGZzBBImUYw8LFZ3jKRBA7fuJsvYBgsxnsy8_0yIFrlycHCv1dprtAQb_4ClcFIsCMTmD_xCvattLhYoN9XJ1bbmIOCMZzV8W2Sldkmj0qMJGWziCwuN0opHMU1bDJMwx0cTwuxC1Jt6WNiGiX9YheaD1Zj8sBTZdp4XNYFBWYYYCnYYylX1ViRmDQmzxNJJ4_olR5xJX33S4pZDAuHDdBg'); background-size: cover; background-position: center center;"></div>
        <div class="w-full lg:w-1/3 h-full bg-background relative"></div>
        <div class="hidden lg:block w-1/3 h-full collage-bg opacity-40 grayscale hover:grayscale-0 transition-all duration-1000" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDWgX_9w3gxyKr2CkuZ2U0ymjrDNm7dX4NDH_b6FIO60c7rewP5oWAheR-Cj2lj_5IVJfkUT7KmRZdEjm69QcgsiQ2_-eIfVccMw9_lv9axLlIqqtoeIamz5hLY4Ytrr417OQfBa0ObK_pSywlW0Lw9Xpb-_hPn3NMuSZ8K7Zk5h5WghLllOCaohRfXbT6qmIVq51fXqOpCx6saLHWF873M8WlrJp1n-dpjqCN-54wvHi6fP_ZT6IXmxZTAtNi21mJ0oGB9b0on8Vo'); background-size: cover; background-position: center center;"></div>
    </div>

    <header class="relative z-10 w-full px-margin-safe h-16 flex items-center justify-between bg-background/40 backdrop-blur-sm border-b border-white/5">
        <div class="font-headline-md text-headline-md text-primary tracking-tighter">MangaReadV1</div>
    </header>

    <main class="relative z-10 flex-grow flex items-center justify-center p-gutter">
        <div class="w-full glass-panel asymmetric-border p-12 shadow-2xl flex flex-col gap-8 max-w-[900px] py-20">
            <!-- Tabs -->
            <div class="flex border-b border-white/10">
                <a href="admin_login_1.html" class="flex-1 py-4 font-headline-md text-[48px] tracking-tight transition-all tab-active text-center">Iniciar Sesión</a>
                <a href="admin_login_2.html" class="flex-1 py-4 font-headline-md text-[48px] tracking-tight text-on-surface-variant transition-all hover:text-primary text-center">Registrarse</a>
            </div>
            
            <form id="loginForm" class="space-y-8">
                <div class="space-y-6">
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary group-focus-within:scale-110 transition-transform">mail</span>
                        <input name="email" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant transition-colors outline-none" placeholder="Email de Administrador" type="email" required>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-0 bottom-4 text-primary group-focus-within:scale-110 transition-transform">lock</span>
                        <input name="password" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant transition-colors outline-none" id="login-pass" placeholder="Contraseña" type="password" required>
                        <button type="button" class="absolute right-0 bottom-4 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePass('login-pass', this)">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="hidden border-l-4 border-error bg-error-container/20 p-4 flex gap-4 items-center" id="login-error">
                    <span class="material-symbols-outlined text-error">error</span>
                    <span class="text-label-bold text-on-error-container uppercase">Credenciales Inválidas</span>
                </div>
                <button type="submit" class="w-full bg-primary-container text-on-primary-container font-headline-md text-[40px] py-6 hover:bg-secondary-container hover:text-on-secondary-container active:scale-95 transition-all shadow-[6px_6px_0px_0px_#000000] shonen-glow">
                    INGRESAR COMO ADMINISTRADOR
                </button>
                <div class="flex justify-between items-center text-label-bold">
                    <a class="text-on-surface-variant hover:text-primary transition-colors uppercase tracking-wider text-base" href="#">¿Olvidó su contraseña?</a>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/manga-service.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

    <script>
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }
    </script>
</body>
</html>
