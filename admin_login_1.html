<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Background Layers -->
<div class="fixed inset-0 z-0 flex pointer-events-none">
<div class="hidden lg:block w-1/3 h-full collage-bg opacity-40 grayscale hover:grayscale-0 transition-all duration-1000" style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuDkM6qOiAYPKGNP5c_28WjQW22MXgvWNliiiTSEv4qvpgIBX5r9pqRBEGZzBBImUYw8LFZ3jKRBA7fuJsvYBgsxnsy8_0yIFrlycHCv1dprtAQb_4ClcFIsCMTmD_xCvattLhYoN9XJ1bbmIOCMZzV8W2Sldkmj0qMJGWziCwuN0opHMU1bDJMwx0cTwuxC1Jt6WNiGiX9YheaD1Zj8sBTZdp4XNYFBWYYYCnYYylX1ViRmDQmzxNJJ4_olR5xJX33S4pZDAuHDdBg&quot;); background-size: cover; background-position: center center;"></div>
<div class="w-full lg:w-1/3 h-full bg-background relative">

</div>
<div class="hidden lg:block w-1/3 h-full collage-bg opacity-40 grayscale hover:grayscale-0 transition-all duration-1000" style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuDWgX_9w3gxyKr2CkuZ2U0ymjrDNm7dX4NDH_b6FIO60c7rewP5oWAheR-Cj2lj_5IVJfkUT7KmRZdEjm69QcgsiQ2_-eIfVccMw9_lv9axLlIqqtoeIamz5hLY4Ytrr417OQfBa0ObK_pSywlW0Lw9Xpb-_hPn3NMuSZ8K7Zk5h5WghLllOCaohRfXbT6qmIVq51fXqOpCx6saLHWF873M8WlrJp1n-dpjqCN-54wvHi6fP_ZT6IXmxZTAtNi21mJ0oGB9b0on8Vo&quot;); background-size: cover; background-position: center center;"></div>
</div>
<!-- Top Bar Placeholder for Brand Identity -->
<header class="relative z-10 w-full px-margin-safe h-16 flex items-center justify-between bg-background/40 backdrop-blur-sm border-b border-white/5">
<div class="font-headline-md text-headline-md text-primary tracking-tighter">MangaReadV1</div>

</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center p-gutter">
<!-- Login/Register Card -->
<div class="w-full glass-panel asymmetric-border p-12 shadow-2xl flex flex-col gap-8 transform transition-transform duration-500 hover:scale-[1.01] max-w-[900px] py-20">
<!-- Tabs -->
<div class="flex border-b border-white/10">
<button class="flex-1 py-4 font-headline-md text-[48px] tracking-tight transition-all tab-active" id="tab-login" onclick="switchTab('login')">
                    Iniciar Sesión
                </button>
<button class="flex-1 py-4 font-headline-md text-[48px] tracking-tight text-on-surface-variant transition-all hover:text-primary" id="tab-register" onclick="switchTab('register')">
                    Registrarse
                </button>
</div>
<!-- Login Form -->
<form id="loginForm" class="active space-y-8" data-tab-content="" id="content-login">
<div class="space-y-6">
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-primary group-focus-within:scale-110 transition-transform">mail</span>
<input id="email" name="email" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant transition-colors outline-none" placeholder="Email de Administrador" type="email" required>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-primary group-focus-within:scale-110 transition-transform">lock</span>
<input id="password" name="password" class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant transition-colors outline-none" id="login-pass" placeholder="Contraseña" type="password" required>
<button type="button" class="absolute right-0 bottom-4 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePass('login-pass', this)">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Validation Message (Hidden by default) -->
<div class="hidden border-l-4 border-error bg-error-container/20 p-4 flex gap-4 items-center" id="login-error">
<span class="material-symbols-outlined text-error">error</span>
<span class="text-label-bold text-on-error-container uppercase">Credenciales Inválidas</span>
</div>
<button type="submit" class="w-full bg-primary-container text-on-primary-container font-headline-md text-[40px] py-6 hover:bg-secondary-container hover:text-on-secondary-container active:scale-95 transition-all shadow-[6px_6px_0px_0px_#000000] shonen-glow">
                    INGRESAR COMO ADMINISTRADOR
                </button>
<div class="flex justify-between items-center text-label-bold">
<a class="text-on-surface-variant hover:text-primary transition-colors uppercase tracking-wider text-base" href="#">¿Olvidó su contraseña?</a>
<span class="text-primary/50 text-sm">V1.4.2 SECURE</span>
</div>
</form>
<!-- Registration Form -->
<div class="space-y-8" data-tab-content="" id="content-register">
<div class="space-y-6">
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">mail</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Nuevo Email Admin" type="email">
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">lock</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" id="reg-pass" placeholder="Contraseña Segura" type="password">
<button class="absolute right-0 bottom-4 text-on-surface-variant hover:text-primary" onclick="togglePass('reg-pass', this)">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-primary">verified_user</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-primary/30 focus:border-primary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Confirmar Contraseña" type="password">
</div>
<div class="pt-4">
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 bottom-4 text-tertiary">key</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-tertiary/30 focus:border-tertiary focus:ring-0 pl-12 pb-3 pt-6 text-on-surface text-lg placeholder:text-on-surface-variant outline-none" placeholder="Código de Autorización" type="text">
</div>
<p class="mt-3 text-label-bold text-sm text-on-surface-variant flex gap-2 items-start leading-tight">
<span class="material-symbols-outlined text-base text-tertiary">info</span>
                            Se requiere un código válido para completar el registro de administrador.
                        </p>
</div>
</div>
<button class="w-full bg-tertiary text-on-tertiary font-headline-md text-[40px] py-6 hover:brightness-110 active:scale-95 transition-all shadow-[6px_6px_0px_0px_#000000]">
                    CREAR CUENTA ADMIN
                </button>
</div>
</div>
</main>
<!-- Footer Component -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/manga-service.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script class="">
        function switchTab(tab) {
            if (tab === 'register') {
                window.location.href = 'admin_login_2.html';
            } else {
                window.location.href = 'admin_login_1.html';
            }
        }

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }
        
        // Inicialización de la aplicación
        document.addEventListener('DOMContentLoaded', () => {
            App.initAdminLogin();
        });
    </script>
</body>
</html>
